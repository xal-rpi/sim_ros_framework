# Simulator configuration
beamng:
  host: 127.0.0.1
  port: 25252
  open_args:
    launch: False
    debug: False
    extensions:
      - xlab/xlabCore
  setup_funcs:
    beamng.settings.set_deterministic:
      steps_per_second: 0
    beamng.ui.show_hud: {}

# content/vehicles/
# "default_vehicle" - The standard datablock for vehicles (static or dynamic)
# "simple_object" - For basic physics objects
# "static_object" - For completely static, non-interactive objects
# "dynamic_object" - For physics-enabled interactive objects

# "BeamNGVehicle" - For any vehicle-based object (both drivable vehicles and static vehicle props)
# "TSStatic" - For static mesh objects that don't have physics
# "DecalRoad" - For road objects
# "TerrainBlock" - For terrain objects

# Scenario configuration
