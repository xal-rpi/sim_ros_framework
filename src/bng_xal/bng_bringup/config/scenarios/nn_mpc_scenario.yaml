post_scenario: {}

# Vehicle configuration
vehicles:
  ego: # Name of the car
    model: utv
    partConfig: /vehicles/utv/wild.pc
    license: EGO
    scenario_args:
      pos: [0,0,0]
      yaw_angle: 0
      # pos: [1898.416,3264.380,180.369]
      # # # pos: [-922.15802,-929.867981,135.533997]
      # yaw_angle: 180.0
      # # rot_quat: [0, 0, 0, 1.0]
    sensors:
      gtstate:
        type: GtState
        # gfx_update_time: 0.1
        # physics_update_time: 0.004
        # num_physics_steps_for_gfx_save: 1
        gfx_update_time: 0.15
        physics_update_time: 0.004
        num_physics_steps_for_gfx_save: 2
    controllers:
      LowLevelController: # The python class used
        controllerType: nn_mpc # The lua controller used
        gtStateName: gtstate
        drivetrain:
          mode: 2 # 0 : realistic, 1 : realistic autoclutch, 2 : arcade, 3 : realistic automatic
          startGear: 2 # with cvt, 0 : neutral, 1 : park, 2 : drive
        calibration:
          controlMode : auto
          gtStateSendRate: 0.01
          # modelName: wheel_speed_v4.json
          ctrl_type: 1 # 0 : wrdot,fxr; 1 : ff torque
          # modelName: wheel_speed_wit_integ_v1.json
          modelName: arata_torque_inverter.json
          TorqueKp: -0.21040940284729004
          TorqueKd: -0.000756041263230145
          TorqueKi: -20.635147094726562
          steeringKi: 0.1
          steeringKp: 0.01
          steeringToInput: -0.5948683325943701
          steeringIntegAlpha: 0.9 # 0.9
          commandTimeout: 1.0 # Timeout between two mpc solutions before giving back control
          ffcoef: 0.8
  # bolide: # Name of the car
  #   model: bolide
  #   # partConfig: /vehicles/utv/wild.pc
  #   license: EGO
  #   scenario_args:
  #     pos: [94.8773766,-53.2508202,23.1649094] # [50,0,0]
  #     yaw_angle: 0

# ROS configuration
ros_poll_config:
  ego:
    gtstate:
      topic: /ego/gtstate
      poll_time: 0.15
      publish: 1


