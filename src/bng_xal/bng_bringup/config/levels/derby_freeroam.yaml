# Level-Centric Configuration Example
# Works in both CREATE mode (loads level + spawns vehicle) and ATTACH mode (attaches to running session)

beamng:
  host: 127.0.0.1
  port: 25252
  open_args:
    launch: False
    extensions:
      - xlab/xlabCore  # REQUIRED - automatically added if missing
  setup_funcs:
    beamng.settings.set_deterministic:
      steps_per_second: 0
    beamng.ui.show_hud: {}

# Level configuration (new schema)
scenario:
  level: derby  # Level to load in CREATE mode
  name: basics  # Optional objects to spawn

extra_objects: {}  # Optional objects to spawn

# Vehicle configuration
vehicles:
  ego:
    model_args:
      model: sunburst2
      part_config: /vehicles/sunburst2/drift_pro.pc
    spawn:  # Renamed from scenario_args
      pos: [44.05, 127.22, 79.3]
      yaw_angle: 0
      cling: True  # Ground snapping
    sensors:
      gtstate:
        type: GtState
        gfx_update_time: 0.025
        physics_update_time: 0.005
        num_physics_steps_for_gfx_save: 2
      basicState:
        type: BasicState

# ROS publishing configuration
ros_poll_config:
  ego:
    gtstate:
      topic: /ego/gtstate
      poll_time: 0.02
      publish: 1
    basicState:
      topic: /ego/basicState
      poll_time: 0.05
      publish: 1
