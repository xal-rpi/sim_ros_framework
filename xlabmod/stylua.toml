# Use Lua syntax
syntax = "Lua54"

# Wrap lines at 100 characters
column_width = 100

# Indent with spaces, 2 per level
indent_type = "Spaces"
indent_width = 2

# Prefer single quotes when possible
quote_style = "AutoPreferSingle"

# Unix line endings
line_endings = "Unix"

# How to print empty-arg calls (we want to keep the parens)
call_parentheses = "Always"

# Don’t collapse simple functions into one-liners
collapse_simple_statement = "Always"

# No extra space between function name and the "("
space_after_function_names = "Never"
